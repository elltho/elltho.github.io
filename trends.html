  <style>
    #demand-radar{
      --ink:#000;
      --paper:#fff;
      --line: rgba(0,0,0,.18);
      --accent:#6a00ff;

      font-family: Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      margin:0;
      padding:48px 56px;
    }

    #demand-radar .brand{
      font-weight:900;
      letter-spacing:.2px;
      margin:0 0 40px 0;
    }

    #demand-radar h1{
      font-size: clamp(54px, 6vw, 96px);
      line-height: .95;
      letter-spacing:-1px;
      margin: 0 0 14px 0;
      text-transform: uppercase;
    }

    #demand-radar .sub{
      max-width: 60ch;
      font-size: 16px;
      line-height: 1.5;
      margin:0 0 28px 0;
    }

    #demand-radar .panel{
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin: 18px 0;
    }

    #demand-radar .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    #demand-radar input,
    #demand-radar select{
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      min-width: 220px;
    }

    #demand-radar select{ min-width: 84px; }

    #demand-radar button{
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      cursor:pointer;
      font-weight: 600;
    }

    #demand-radar button:hover{
      background: rgba(0,0,0,.04);
    }

    #demand-radar .meta{
      font-size: 13px;
      color: rgba(0,0,0,.65);
      margin-top: 10px;
    }

    #demand-radar .kicker{
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: rgba(0,0,0,.7);
    }

    #demand-radar #insightBox p{
      margin: 6px 0;
      font-size: 14px;
    }

    #demand-radar ul{ padding-left: 18px; margin: 10px 0 0; }
    #demand-radar li{ margin: 6px 0; }

    #demand-radar canvas{ width:100% !important; height:auto !important; }

    #demand-radar .grid{
      display:grid;
      grid-template-columns: 1.35fr .65fr;
      gap:18px;
    }

    #demand-radar a.back{
      display:inline-block;
      margin-top: 18px;
      color: var(--ink);
      text-decoration:none;
      border-bottom: 1px solid var(--line);
    }

    @media (max-width: 980px){
      #demand-radar{ padding: 28px 18px; }
      #demand-radar .grid{ grid-template-columns: 1fr; }
      #demand-radar input{ min-width: 180px; }
    }

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PGJS6PKM"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

      <a href="index.html" style="text-decoration: none; color: inherit;">
        ELLEN THORELL©

    </div>

      <a href="cases.html">Work</a>

    </div>

  <main id="demand-radar">
    <h1>Demand Radar</h1>
    <p class="sub">Rapid demand insights powered by Google Trends.</p>

    <div class="panel" id="hero">
      <div class="row">
        <input id="keyword" placeholder="Ex: padel, CRM, serum" />
        <select id="geo">
          <option value="SE">SE</option>
          <option value="US">US</option>
          <option value="GB">GB</option>
        </select>
        <button onclick="run()" type="button">Analyze</button>
      </div>
      <div id="status" class="meta"></div>
    </div>

    <div class="grid" id="results">
      <div class="panel">
        <div class="kicker">Interest over time</div>
        <canvas id="chart"></canvas>
        <div id="insightBox"></div>
      </div>

      <div class="panel">
        <div class="kicker">Rising queries</div>
        <ul id="rising"></ul>
        <div class="meta">Note: Trends are indexed 0–100 (relative scale).</div>
      </div>
    </div>

    <a class="back" href="cases.html">← Back to selected cases</a>
  </main>

  <!-- Your existing Trends tool code (unchanged) -->
  <script>
    const API_BASE = "https://trends-api-livid.vercel.app/api/trends";
    let chart;

    async function run() {
      const keyword = document.getElementById("keyword").value.trim();
      const geo = document.getElementById("geo").value;

      if (!keyword) return alert("Skriv ett keyword först");

      const url = `${API_BASE}?keyword=${encodeURIComponent(keyword)}&geo=${encodeURIComponent(geo)}`;
      const res = await fetch(url);
      const data = await res.json();

      renderChart(data.timeline || []);
      renderRising(data.rising || []);
      renderInsights(data.timeline || []);
    }

    function renderChart(timeline) {
      const labels = timeline.map(p => p.date);
      const values = timeline.map(p => p.value);

      const ctx = document.getElementById("chart").getContext("2d");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Search Interest",
            data: values,
            borderColor: "#b58cc6",
            backgroundColor: "#b58cc6",
            pointBackgroundColor: "#b58cc6",
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true, max: 100 }
          }
        }
      });
    }

    function renderRising(items) {
      const list = document.getElementById("rising");
      list.innerHTML = "";

      items.slice(0, 8).forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.query} (${item.value})`;
        list.appendChild(li);
      });
    }

    function renderInsights(timeline) {
      let insightBox = document.getElementById("insightBox");
      insightBox.innerHTML = "";

      if (!timeline || timeline.length < 12) return;

      const values = timeline.map(p => p.value);
      const n = values.length;

      const last12 = values.slice(n - 12);
      const prev12 = values.slice(n - 24, n - 12);

      const avg = arr => arr.reduce((a,b)=>a+b,0) / arr.length;

      if (prev12.length > 0) {
        const change = ((avg(last12) - avg(prev12)) / avg(prev12)) * 100;

        if (change > 5) {
          addLine(`Interest increased ${change.toFixed(0)}% last 3 months`);
        } else if (change < -5) {
          addLine(`Interest decreased ${Math.abs(change).toFixed(0)}% last 3 months`);
        }
      }

      const max = Math.max(...values);
      const maxIndex = values.indexOf(max);
      const spikeDate = timeline[maxIndex].date;
      addLine(`Spike detected in ${spikeDate}`);

      const firstHalf = values.slice(0, Math.floor(n/2));
      const secondHalf = values.slice(Math.floor(n/2));
      const diff = Math.abs(avg(firstHalf) - avg(secondHalf));

      if (diff > 15) {
        addLine("Seasonal pattern detected");
      }

      function addLine(text) {
        const p = document.createElement("p");
        p.style.margin = "4px 0";
        p.style.fontWeight = "500";
        p.textContent = text;
        insightBox.appendChild(p);
      }
    }
  </script>
