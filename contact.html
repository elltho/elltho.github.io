  <!-- Link click tracking -->
  <script>
    (function () {
      window.dataLayer = window.dataLayer || [];

      function cleanText(str) {
        return (str || '').trim().replace(/\s+/g, ' ').slice(0, 200);
      }

      function getLinkText(a) {
        return cleanText(a.getAttribute('aria-label')) ||
               cleanText(a.getAttribute('title')) ||
               cleanText(a.textContent) ||
               'unknown';
      }

      function safeUrl(href) {
        try { return new URL(href, window.location.href).href; }
        catch { return ''; }
      }

      function isOutbound(absUrl) {
        try { return new URL(absUrl).origin !== window.location.origin; }
        catch { return false; }
      }

      function getSection(a) {
        var el = a.closest('#nav, #hero, #cases, #contact, #footer');
        if (el && el.id) return el.id;

        var footer = a.closest('footer');
        if (footer) return 'footer';

        var main = a.closest('main');
        if (main && main.id) return main.id;

        return 'unknown';
      }

      function getLinkType(a, absUrl) {
        var href = (a.getAttribute('href') || '').toLowerCase();

        if (a.classList.contains('cta')) return 'cta';
        if (a.closest('.navbar')) return 'nav';
        if (href.startsWith('mailto:')) return 'email';
        if (href.startsWith('tel:')) return 'phone';
        if (isOutbound(absUrl)) return 'outbound';
        return 'regular';
      }

      document.addEventListener('click', function (e) {
        var link = e.target && e.target.closest ? e.target.closest('a') : null;
        if (!link) return;

        var href = link.getAttribute('href');
        if (!href || href === '#') return;

        var absUrl = safeUrl(href);
        if (!absUrl) return;

        window.dataLayer.push({
          event: 'link_click',
          link_text: getLinkText(link),
          link_url: absUrl,
          link_type: getLinkType(link, absUrl),
          section: getSection(link),
          page_path: window.location.pathname,
          page_title: document.title
        });
      }, true);
    })();
  </script>
