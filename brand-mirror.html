<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Mirror | ELLEN THORELL©</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb" },
          fontFamily: { display: ["Inter", "sans-serif"] },

  <style>
    body{
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .text-huge{
      line-height: 0.9;
      letter-spacing: -0.04em;
    }
  </style>

<body class="bg-white text-slate-900">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html" style="text-decoration: none; color: inherit;">ELLEN THORELL©</a>
    </div>
    <div class="nav-links">
      <a href="cases.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="pt-16 pb-12 px-6">
    <div class="max-w-5xl mx-auto text-center">
      <h1 class="text-huge text-6xl md:text-8xl font-black mb-8">
        HOW DOES YOUR <br />
        BRAND <span class="italic text-primary">MIRROR BACK?</span>
      </h1>
      <p class="text-slate-500 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
        Instantly analyze what your homepage actually signals.
In 10 seconds, see if your brand feels premium, confusing, generic — or conversion-ready.
      </p>
    </div>
  </section>

  <!-- EMAIL SECTION -->
  <section class="py-16 px-6">
    <div class="max-w-7xl mx-auto">
      <div class="grid lg:grid-cols-2 border-4 border-slate-950 overflow-hidden rounded-sm">

        <!-- PURPLE SIDE -->
        <div class="bg-[#d8c5e2] p-16 flex items-center justify-center lg:border-r-4 border-slate-950">
          <h2 class="text-5xl md:text-7xl font-black leading-[0.9] text-slate-950 uppercase italic tracking-tighter">
            Get the<br />
            <span class="text-primary not-italic">Extension.</span>
          </h2>
        </div>

        <!-- WHITE SIDE -->
        <div class="bg-white p-16 flex flex-col justify-center">
          <span class="text-primary font-black text-xs tracking-[0.3em] uppercase mb-12 block">
            Limited Early Access
          </span>

          <div class="space-y-8">

            <input
              id="emailInput"
              class="w-full border-b-2 border-slate-200 focus:border-primary px-0 py-4 text-2xl font-black text-slate-900 placeholder:text-slate-300 bg-transparent uppercase outline-none"
              placeholder="NAME@YOURBRAND.COM"
              type="email"
              required
            />

            <button
              id="downloadBtn"
              disabled
              class="w-full bg-gray-300 text-white font-black text-sm tracking-[0.2em] py-6 uppercase transition-colors cursor-not-allowed"
              type="button"
            >
              Download the extension
            </button>

          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer style="padding: 60px 40px; text-align: center; font-family: monospace; font-size: 0.8rem; border-top: 1px solid rgba(0,0,0,0.1); margin-top: 10vh;">
    ELLEN THORELL© 2026
  </footer>

  <!-- SCRIPT -->
  <script>
    const emailInput = document.getElementById("emailInput");
    const downloadBtn = document.getElementById("downloadBtn");

    // Enable button only when valid email
    emailInput.addEventListener("input", function () {
      if (emailInput.checkValidity()) {
        downloadBtn.disabled = false;
        downloadBtn.classList.remove("bg-gray-300","cursor-not-allowed");
        downloadBtn.classList.add("bg-primary","hover:bg-blue-700","cursor-pointer");
      } else {
        downloadBtn.disabled = true;
        downloadBtn.classList.remove("bg-primary","hover:bg-blue-700","cursor-pointer");
        downloadBtn.classList.add("bg-gray-300","cursor-not-allowed");
      }
    });

    // Download logic
    downloadBtn.addEventListener("click", function () {
      if (!emailInput.checkValidity()) return;

      const a = document.createElement("a");
      a.href = "downloads/brand-mirror-extension.zip";
      a.download = "brand-mirror-extension.zip";
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  </script>

</body>
</html>
